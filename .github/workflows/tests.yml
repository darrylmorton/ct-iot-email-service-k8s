name: Lint, Tests

on:
  push:
    branches-ignore: ["main"]

env:
  AWS_REGION: eu-west-2
  USERNAME: foo@example.com
  SES_SOURCE: noreply@example.com
  SES_TARGET:  foo@example.com
  SENTRY_TRACES_SAMPLE_RATE: 1.0
  SENTRY_PROFILES_SAMPLE_RATE: 0.5
  SENTRY_SAMPLE_RATE: 50
  SERVICE_NAME: email-service
  LOG_LEVEL: DEBUG
  ENVIRONMENT: test
  APP_HOST: localhost
  UVICORN_PORT: 8003
  CONSUMER_BOOTSTRAP_SERVERS: localhost:9092
  CONSUMER_SESSION_TIMEOUT_MILLIS: 6000
  CONSUMER_AUTO_OFFSET_RESET: earliest
  CONSUMER_ENABLE_AUTO_OFFSET_STORE: False
  QUEUE_PROTOCOL: PLAINTEXT
  QUEUE_HOST: localhost
  QUEUE_PORTS: 9092,9093,9094
  QUEUE_TIMEOUT_SECONDS: 0
  QUEUE_ACKS: all
  QUEUE_POLL_WAIT_SECONDS: 1
  QUEUE_TOPIC_NAME: email-topic
  QUEUE_DLQ_NAME: emil-dlq
  QUEUE_GROUP_ID: email-topic-group
  EMAIL_ACCOUNT_VERIFICATION_TYPE: ACCOUNT_VERIFICATION
  JWT_SECRET_VERIFY_ACCOUNT: ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789ABC
  JWT_EXPIRY_SECONDS_VERIFY_ACCOUNT: 3600

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up python:wq
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Load cached Poetry installation
        id: cached-poetry
        uses: actions/cache@v4
        with:
          path: ~/.local  # the path depends on the OS
          key: poetry-0  # increment to reset cache

      - name: Install Poetry
        if: steps.cached-poetry.outputs.cache-hit != 'true'
        uses: snok/install-poetry@v1

      - name: Install project
        run: poetry install

      - name: Run lint
        run: make lint

  unit-tests:
    runs-on: ubuntu-latest
    needs: [ lint ]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up python:wq
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Load cached Poetry installation
        id: cached-poetry
        uses: actions/cache@v4
        with:
          path: ~/.local  # the path depends on the OS
          key: poetry-0  # increment to reset cache

      - name: Install Poetry
        if: steps.cached-poetry.outputs.cache-hit != 'true'
        uses: snok/install-poetry@v1

      - name: Install project
        run: poetry install

      - name: Run unit tests
        run: make test-unit

  integration-tests:
    runs-on: ubuntu-latest
    needs: [ lint ]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up python:wq
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Load cached Poetry installation
        id: cached-poetry
        uses: actions/cache@v4
        with:
          path: ~/.local  # the path depends on the OS
          key: poetry-0  # increment to reset cache

      - name: Install Poetry
        if: steps.cached-poetry.outputs.cache-hit != 'true'
        uses: snok/install-poetry@v1

      - name: Install project
        run: poetry install

      - name: Setup dependencies
        run: docker compose -f docker-compose.yml up -d

      - name: Sleep
        uses: kibertoad/wait-action@1.0.1
        with:
          time: '5s'

      - name: Docker running containers
        run: docker ps -a

      - name: Run integration tests
        run: make test-integration
